<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VeriScope</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #171717;
            --border-color: #333333;
            --text-main: #ffffff;
            --text-dim: #b4b4b4;
            --accent-blue: #007bff;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-main);
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            text-align: center;
        }

        .logo-box {
            margin-bottom: 24px;
        }

        /* VeriScope Icon style from your first image */
        .shield-icon {
            background: #1a73e8;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        p {
            color: var(--text-dim);
            font-size: 14px;
            margin-bottom: 32px;
        }

        /* Social Buttons */
        .social-btn {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.2s;
        }

        .social-btn:hover {
            background: #222;
        }

        /* Separator line */
        .separator {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: var(--text-dim);
            font-size: 12px;
        }

        .separator::before, .separator::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .separator:not(:empty)::before { margin-right: 15px; }
        .separator:not(:empty)::after { margin-left: 15px; }

        /* Input Styles */
        .input-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .input-field {
            width: 100%;
            padding: 14px;
            background: #212121;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }

        .input-field:focus {
            border-color: #666;
        }

        /* Pill shaped continue button */
        .btn-continue {
            width: 100%;
            padding: 14px;
            background: #ffffff;
            color: #000000;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s;
        }

        .btn-continue:hover {
            opacity: 0.9;
        }

        .footer-text {
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-dim);
        }

        .footer-text a {
            color: var(--accent-blue);
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-box">
            <div class="shield-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                    <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.47 4.34-3.13 8.16-7 9.43V11.99H5V6.3l7-3.11v8.8z"/>
                </svg>
            </div>
            <h1>Log in or sign up</h1>
            <p>Welcome to VeriScope</p>
        </div>

        <button class="social-btn">Continue with Google</button>
        <button class="social-btn">Continue with Microsoft</button>
        <button class="social-btn">Continue with Apple</button>

        <div class="separator">OR</div>

        <form action="/login" method="POST">
            <div class="input-group">
                <input type="email" name="email" class="input-field" placeholder="Email address" required>
            </div>
            <button type="submit" class="btn-continue">Continue</button>
        </form>

        <div class="footer-text">
            Don't have an account? <a href="/signup">Sign up</a>
        </div>
    </div>

</body>
</html>

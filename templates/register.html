<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up – VeriScope</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0a0a0a; color: #ececec;
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 24px;
        }
        .logo {
            display: flex; align-items: center; gap: 10px;
            font-size: 22px; font-weight: 700; color: #fff;
            margin-bottom: 32px; text-decoration: none;
        }
        .logo-icon {
            width: 40px; height: 40px; background: #3b82f6;
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        .card {
            background: #141414; border: 1px solid #2a2a2a;
            border-radius: 16px; padding: 36px 40px;
            width: 100%; max-width: 400px;
        }
        .card h1 { font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 6px; text-align: center; }
        .card .sub { font-size: 14px; color: #666; text-align: center; margin-bottom: 28px; }
        .alert { padding: 12px 14px; border-radius: 10px; font-size: 13px; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
        .alert-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); color: #fca5a5; }
        .field { margin-bottom: 16px; }
        .field label { display: block; font-size: 13px; font-weight: 600; color: #aaa; margin-bottom: 7px; }
        .field input {
            width: 100%; background: #1e1e1e; border: 1px solid #2e2e2e;
            border-radius: 10px; padding: 13px 16px; color: #fff;
            font-size: 15px; font-family: inherit; outline: none; transition: 0.2s;
        }
        .field input::placeholder { color: #444; }
        .field input:focus { border-color: #3b82f6; background: #1a1a2e; }
        .btn-submit {
            width: 100%; background: #fff; color: #000; border: none;
            border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 700;
            cursor: pointer; transition: 0.2s; margin-top: 6px; font-family: inherit;
        }
        .btn-submit:hover { background: #e5e5e5; }
        .divider { display: flex; align-items: center; gap: 12px; margin: 22px 0; color: #333; font-size: 13px; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #2a2a2a; }
        .footer-link { text-align: center; font-size: 14px; color: #666; margin-top: 24px; }
        .footer-link a { color: #3b82f6; text-decoration: none; font-weight: 600; }
        .footer-link a:hover { text-decoration: underline; }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: #555; font-size: 13px; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
        .back-link a:hover { color: #aaa; }
        .password-hint { font-size: 11px; color: #555; margin-top: 5px; }
    </style>
</head>
<body>

<a href="/" class="logo">
    <div class="logo-icon">🛡️</div>
    VeriScope
</a>

<div class="card">
    <h1>Create account</h1>
    <p class="sub">Start scanning unlimited URLs for free</p>

    {% if error %}
    <div class="alert alert-error">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/register">
        <div class="field">
            <label>Email address</label>
            <input type="email" name="email" id="emailField"
                placeholder="you@example.com" required autofocus
                value="{{ prefill_email or '' }}" />
        </div>
        <div class="field">
            <label>Password</label>
            <input type="password" name="password" placeholder="Create a password (min 6 chars)" required minlength="6" />
            <p class="password-hint">At least 6 characters</p>
        </div>
        <button type="submit" class="btn-submit">Create account</button>
    </form>

    <div class="divider">or</div>

    <div class="footer-link">
        Already have an account? <a href="/login">Log in</a>
    </div>
</div>

<div class="back-link">
    <a href="/">← Back to scanner</a>
</div>

<script>
    const p = new URLSearchParams(window.location.search);
    if (p.get('u')) document.getElementById('emailField').value = p.get('u');
</script>
</body>
</html>
